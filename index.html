<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" type="image/png" href="logo.png">

<style>
body {
  font-family: Arial, sans-serif;
  color: #eee;
  margin: 0;
  overflow-x: hidden;
}

/* === ФОН (анимированный) === */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: url("bg_v3.png") repeat;
  background-size: 128px 128px;

  animation: moveBg 15s linear infinite;

  opacity: 0.88;
  filter: brightness(0.4);

  z-index: -1;
}

@keyframes moveBg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* === КОНТЕЙНЕР === */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* === HEADER === */
h1 {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-logo {
  width: 32px;
  height: 32px;
}

/* === ДЕРЕВО === */
ul {
  list-style: none;
  padding-left: 20px;
}

li {
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
}

li:hover {
  background: rgba(255,255,255,0.05);
}

.folder::before {
  content: "📁 ";
}

.file::before {
  content: "📄 ";
}

/* === ФАЙЛЫ === */
.file {
  display: flex;
  justify-content: space-between;
  max-width: 700px;
}

.file.demo {
  color: #4aa3ff;
}

.file.gho {
  color: #c084fc;
}

.file-size {
  color: #888;
  margin-left: 10px;
}

/* === ПАПКИ === */
.folder > ul {
  display: none;
}

.folder.open > ul {
  display: block;
}

.file-count {
  color: #aaa;
  margin-left: 5px;
  font-size: 0.85em;
}

/* === УВЕДОМЛЕНИЕ КОПИРОВАНИЯ === */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px 15px;
  border-radius: 8px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">

<h1>
  <img src="logo.png" class="header-logo">
  fomjn
</h1>

<ul id="fileTree"></ul>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
async function loadStructure() {
  const res = await fetch("structure.json");
  const data = await res.json();
  buildTree(document.getElementById("fileTree"), data);
}

function buildTree(container, structure) {
  Object.entries(structure).forEach(([key, value]) => {

    // === ФАЙЛЫ ===
    if (key === "_files") {
      value.forEach(file => {
        if (file.name.toLowerCase() === "desktop.ini") return;

        const li = document.createElement("li");
        li.classList.add("file");

        // тип файла
        if (file.name.endsWith(".demo")) li.classList.add("demo");
        if (file.name.endsWith(".gho")) li.classList.add("gho");

        li.innerHTML = `
          <span>${file.name}</span>
          <span class="file-size">${file.size}</span>
        `;

        // КОПИРОВАНИЕ
        li.addEventListener("click", (e) => {
          e.stopPropagation();
          navigator.clipboard.writeText(file.name);
          showToast();
        });

        container.appendChild(li);
      });
      return;
    }

    // === ПАПКИ ===
    const li = document.createElement("li");
    li.classList.add("folder");
    li.textContent = key;

    const count = countFiles(value);
    const span = document.createElement("span");
    span.className = "file-count";
    span.textContent = `(${count})`;
    li.appendChild(span);

    const ul = document.createElement("ul");
    buildTree(ul, value);
    li.appendChild(ul);

    li.addEventListener("click", (e) => {
      e.stopPropagation();
      li.classList.toggle("open");
    });

    container.appendChild(li);
  });
}

function countFiles(structure) {
  let total = 0;
  Object.values(structure).forEach(value => {
    if (Array.isArray(value)) {
      total += value.length;
    } else if (typeof value === "object") {
      total += countFiles(value);
    }
  });
  return total;
}

/* === TOAST === */
function showToast() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1000);
}

loadStructure();
</script>

</body>
</html>
