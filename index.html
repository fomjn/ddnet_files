<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* {
  box-sizing: border-box;
  cursor: url("cursor.png") 0 0, auto !important;
  user-select: none;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  color: #ddd;
  overflow: hidden;
}

/* ===== ФОН ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);
  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* ===== КОНТЕЙНЕР ===== */
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 5;

  display: flex;
  padding: 8px 140px 8px 12px; /* место справа под кнопку */
  background: rgba(255,255,255,0.06);
}

.header-name { flex: 3; }
.header-size { flex: 1; max-width: 120px; text-align: right; }

.header-cell {
  padding: 6px;
  cursor: pointer;
}

.header-cell:hover {
  background: rgba(255,255,255,0.15);
}

/* ===== СПИСОК ===== */
.file-list {
  flex: 1;
  overflow-y: auto;
}

.file-list::-webkit-scrollbar {
  width: 10px;
}
.file-list::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.25);
}

/* ===== СТРОКА ===== */
.file {
  display: flex;
  padding: 10px 12px;
}

.file:hover {
  background: rgba(255,255,255,0.08);
}

.file.active {
  background: rgba(255,255,255,0.18);
}

.name { flex: 3; overflow: hidden; white-space: nowrap; }
.size { flex: 1; max-width: 120px; text-align: right; color: #aaa; }

.icon {
  width: 18px;
  margin-right: 8px;
}

/* ===== SEARCH ===== */
.search {
  display: flex;
  align-items: center;
  padding: 8px;
  background: rgba(255,255,255,0.06);
}

.search img {
  width: 18px;
  margin-right: 6px;
}

.search input {
  flex: 1;
  padding: 8px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #ccc;
}

.search button {
  background: transparent;
  border: none;
  color: #aaa;
  font-size: 18px;
  cursor: pointer;
}

.search button:hover {
  color: #fff;
}

/* ===== MUSIC BUTTON ===== */
.music-btn {
  position: fixed;
  top: 10px;
  right: 12px;
  width: 28px;
  height: 28px;
  z-index: 10;
  opacity: 0.8;
}

.music-btn:hover {
  opacity: 1;
}

/* ===== MUSIC PANEL ===== */
.music-panel {
  position: fixed;
  top: 50px;
  right: 12px;
  width: 180px;

  background: rgba(255,255,255,0.06);
  padding: 10px;
  border-radius: 6px;

  display: none;
  flex-direction: column;
  gap: 10px;
}

.music-panel.show {
  display: flex;
}

/* кнопка play */
.music-play {
  width: 24px;
  height: 24px;
  cursor: pointer;
}

/* громкость */
.volume {
  width: 100%;
}

/* ===== TOAST ===== */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show { opacity: 1; }

</style>
</head>

<body>

<!-- кнопка -->
<img id="musicToggle" class="music-btn" src="music.png">

<!-- панель -->
<div id="musicPanel" class="music-panel">
  <img id="musicPlay" class="music-play" src="play.png">
  <input id="volume" class="volume" type="range" min="0" max="1" step="0.01">
</div>

<audio id="music" loop>
  <source src="music_menu.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <div class="header">
    <div id="header-name" class="header-cell header-name">Name</div>
    <div id="header-size" class="header-cell header-size">Size</div>
  </div>

  <div id="files" class="file-list"></div>

  <div class="search">
    <img src="loupe.png">
    <input id="search" placeholder="Search">
    <button id="clear">×</button>
  </div>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let root = null;
let current = null;
let selected = null;

let nameAsc = true;
let sizeAsc = true;

/* ===== SIZE ===== */
function parseSize(size) {
  if (!size) return 0;
  let [num, unit] = size.split(" ");
  num = parseFloat(num);
  if (unit === "MB") return num * 1024;
  return num;
}

/* ===== РЕНДЕР ===== */
function render(folder) {
  const el = document.getElementById("files");
  el.innerHTML = "";
  current = folder;

  if (folder.parent) {
    el.appendChild(row("../", "", () => render(folder.parent), "tree.png"));
  }

  folder.children.forEach(item => {
    let icon = "file.png";
    if (item.type === "folder") icon = "folder.png";
    if (item.name.endsWith(".demo")) icon = "film.png";

    el.appendChild(row(item.name, item.size, () => {
      if (item.type === "folder") render(item);
      else copy(item.name);
    }, icon));
  });
}

/* ===== ROW ===== */
function row(name, size, action, icon) {
  const div = document.createElement("div");
  div.className = "file";

  div.innerHTML = `
    <div class="name">
      <img class="icon" src="${icon}"> ${name}
    </div>
    <div class="size">${size || ""}</div>
  `;

  div.onclick = () => {
    if (selected) selected.classList.remove("active");
    div.classList.add("active");
    selected = div;
  };

  div.ondblclick = action;
  return div;
}

/* ===== SORT ===== */
document.getElementById("header-name").onclick = () => {
  current.children.sort((a, b) =>
    nameAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name)
  );
  nameAsc = !nameAsc;
  render(current);
};

document.getElementById("header-size").onclick = () => {
  current.children.sort((a, b) =>
    sizeAsc
      ? parseSize(a.size) - parseSize(b.size)
      : parseSize(b.size) - parseSize(a.size)
  );
  sizeAsc = !sizeAsc;
  render(current);
};

/* ===== SEARCH ===== */
document.getElementById("search").oninput = e => {
  const q = e.target.value.toLowerCase();
  if (!q) return render(current);

  const el = document.getElementById("files");
  el.innerHTML = "";

  const all = flatten(root);

  all.forEach(item => {
    if (item.name.toLowerCase().includes(q)) {
      el.appendChild(row(item.name, item.size, () => {}, "file.png"));
    }
  });
};

document.getElementById("clear").onclick = () => {
  document.getElementById("search").value = "";
  render(current);
};

/* ===== FLATTEN ===== */
function flatten(node) {
  let arr = [];
  if (node.children) {
    node.children.forEach(c => {
      arr.push(c);
      if (c.children) arr = arr.concat(flatten(c));
    });
  }
  return arr;
}

/* ===== COPY ===== */
function copy(text) {
  navigator.clipboard.writeText(text);
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 800);
}

/* ===== MUSIC ===== */
const music = document.getElementById("music");
const toggle = document.getElementById("musicToggle");
const panel = document.getElementById("musicPanel");
const playBtn = document.getElementById("musicPlay");
const volume = document.getElementById("volume");

let playing = false;

/* открыть панель */
toggle.onclick = () => {
  panel.classList.toggle("show");
};

/* play / pause */
playBtn.onclick = () => {
  if (!playing) {
    music.play().catch(()=>{});
    playBtn.src = "pause.png";
    playing = true;
  } else {
    music.pause();
    playBtn.src = "play.png";
    playing = false;
  }
};

/* громкость */
volume.value = 0.4;
music.volume = 0.4;

volume.oninput = () => {
  music.volume = volume.value;
};

/* ===== PARENTS ===== */
function link(node, parent=null) {
  node.parent = parent;
  if (node.children) node.children.forEach(c => link(c, node));
}

fetch("./structure.json")
  .then(r => r.json())
  .then(data => {
    root = data;
    link(root);
    render(root);
  });

</script>

</body>
</html>
