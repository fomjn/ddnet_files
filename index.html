<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* { box-sizing: border-box; cursor: url("cursor.png") 0 0, auto !important; }

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  color: #ddd;
}

/* фон */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);
  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* контейнер */
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* header */
.header {
  display: flex;
  padding: 10px;
  background: linear-gradient(#5f6368, #3a3d42);
}

.header div { flex: 1; }

/* список */
.file-list {
  flex: 1;
  overflow-y: auto;
}

/* строка */
.file {
  display: flex;
  padding: 6px 10px;
}

.file:hover {
  background: rgba(255,255,255,0.1);
}

.file.active {
  background: #fff;
  color: #000;
}

/* колонки */
.name {
  flex: 3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.size { flex: 1; }
.date { flex: 2; }

/* поиск */
.search {
  display: flex;
  align-items: center;
  padding: 6px;
  background: #2a2d31;
}

.search img {
  width: 16px;
  height: 16px;
  margin-right: 6px;
}

.search input {
  flex: 1;
  padding: 6px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: #ccc;
  outline: none;
  caret-color: #fff;
}

.search button {
  background: none;
  border: none;
  color: #ccc;
  font-size: 16px;
  margin-left: 6px;
  cursor: pointer;
}

/* toast */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show { opacity: 1; }

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div>Name</div>
    <div>Size</div>
    <div>Date</div>
  </div>

  <div id="files" class="file-list"></div>

  <div class="search">
    <img src="loupe.png" alt="Search">
    <input id="search" placeholder="Search">
    <button id="clear">×</button>
  </div>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let root = null;
let current = null;

/* ===== РЕНДЕР ===== */
function render(folder) {
  const container = document.getElementById("files");
  container.innerHTML = "";
  current = folder;

  // НАЗАД
  if (folder.parent) {
    container.appendChild(row(" ../", "", "", () => {
      render(folder.parent);
    }, "tree.png"));
  }

  folder.children.forEach(item => {
    if (item.type === "folder") {
      container.appendChild(
        row(item.name, "", "", () => {
          render(item);
        }, "folder.png")
      );
    } else if (item.type === "file") {
      let icon = "file.png";
      if (item.name.endsWith(".demo")) icon = "film.png";
      if (item.name.endsWith(".gho")) icon = "file.png";

      container.appendChild(
        row(item.name, item.size || "", item.date || "", () => {
          navigator.clipboard.writeText(item.name);
          showToast();
        }, icon)
      );
    }
  });
}

/* ===== СТРОКА ===== */
function row(name, size, date, click, icon) {
  const div = document.createElement("div");
  div.className = "file";

  div.innerHTML = `
    <div class="name">
      <img src="${icon}" style="width:16px;height:16px;margin-right:6px;vertical-align:middle;">
      ${name}
    </div>
    <div class="size">${size}</div>
    <div class="date">${date}</div>
  `;

  div.onclick = click;
  return div;
}

/* ===== ПОИСК ПО ВСЕМУ ДЕРЕВУ ===== */
function flattenTree(node) {
  let arr = [];
  if (node.children) {
    node.children.forEach(child => {
      arr.push(child);
      if (child.children) arr = arr.concat(flattenTree(child));
    });
  }
  return arr;
}

/* ===== SEARCH ===== */
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const container = document.getElementById("files");
  container.innerHTML = "";

  if (!root) return;

  const allItems = flattenTree(root);

  allItems.forEach(item => {
    if (item.name.toLowerCase().includes(q)) {
      let icon = "file.png";
      if (item.type === "folder") icon = "folder.png";
      if (item.name.endsWith(".demo")) icon = "film.png";
      if (item.name.endsWith(".gho")) icon = "file.png";

      container.appendChild(
        row(
          item.name,
          item.size || "",
          item.date || "",
          () => { if (item.type === "folder") render(item); },
          icon
        )
      );
    }
  });
});

/* ===== CLEAR BUTTON ===== */
document.getElementById("clear").onclick = () => {
  searchInput.value = "";
  render(root);
};

/* ===== PARENT LINKS ===== */
function linkParents(node, parent=null) {
  node.parent = parent;
  if (node.children) {
    node.children.forEach(child => linkParents(child, node));
  }
}

/* ===== TOAST ===== */
function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 800);
}

/* ===== LOAD ===== */
fetch("./structure.json")
  .then(r => r.json())
  .then(json => {
    root = json;
    linkParents(root);
    render(root);
  })
  .catch(err => {
    console.error(err);
    document.getElementById("files").innerHTML =
      "<div style='padding:20px;color:red'>Ошибка загрузки JSON</div>";
  });
</script>

</body>
</html>
