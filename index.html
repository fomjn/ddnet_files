<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* { box-sizing: border-box; cursor: url("cursor.png") 0 0, auto !important; }

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  color: #ddd;
}

/* фон */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);
  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* контейнер */
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* header с сортировкой */
.header {
  display: flex;
  padding: 6px 10px;
  background: rgba(255,255,255,0.1); /* общий базовый цвет с поиском */
}

.header-cell {
  flex: 1;
  padding: 6px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.header-cell:hover {
  background: rgba(255,255,255,0.2);
}

/* список */
.file-list {
  flex: 1;
  overflow-y: auto;
}

/* строка */
.file {
  display: flex;
  padding: 6px 10px;
}

.file:hover {
  background: rgba(255,255,255,0.1);
}

.file.active {
  background: #fff;
  color: #000;
}

/* колонки */
.name {
  flex: 3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.size { flex: 1; }

/* поиск */
.search {
  display: flex;
  align-items: center;
  padding: 6px;
  background: rgba(255,255,255,0.1); /* базовый фон одинаковый с заголовками */
}

.search img {
  width: 16px;
  height: 16px;
  margin-right: 6px;
}

.search input {
  flex: 1;
  padding: 6px;
  background: rgba(255,255,255,0.1); /* базовый фон */
  border: none;
  color: #ccc;
  outline: none;
  caret-color: #fff;
  transition: background 0.2s;
}

.search input:hover {
  background: rgba(255,255,255,0.2);
}

.search button {
  width: 24px;
  height: 24px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: #ccc;
  font-size: 16px;
  margin-left: 6px;
  cursor: pointer;
  border-radius: 4px;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: background 0.2s;
}

.search button:hover {
  background: rgba(255,255,255,0.2);
}

/* toast */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show { opacity: 1; }

</style>
</head>

<body>

<div class="container">

  <!-- Заголовки с сортировкой -->
  <div class="header">
    <div id="header-name" class="header-cell sortable">Name</div>
    <div id="header-size" class="header-cell sortable">Size</div>
  </div>

  <div id="files" class="file-list"></div>

  <!-- Поиск -->
  <div class="search">
    <img src="loupe.png" alt="Search">
    <input id="search" placeholder="Search">
    <button id="clear">×</button>
  </div>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let root = null;
let current = null;
let nameAsc = true;
let sizeAsc = true;

/* ===== РЕНДЕР ===== */
function render(folder) {
  const container = document.getElementById("files");
  container.innerHTML = "";
  current = folder;

  // НАЗАД
  if (folder.parent) {
    container.appendChild(row(" ../", "", "", () => {
      render(folder.parent);
    }, "tree.png"));
  }

  folder.children.forEach(item => {
    if (item.type === "folder") {
      container.appendChild(
        row(item.name, "", "", () => {
          render(item);
        }, "folder.png")
      );
    } else if (item.type === "file") {
      let icon = "file.png";
      if (item.name.endsWith(".demo")) icon = "film.png";
      if (item.name.endsWith(".gho")) icon = "file.png";

      container.appendChild(
        row(item.name, item.size || "", () => {
          navigator.clipboard.writeText(item.name);
          showToast();
        }, icon)
      );
    }
  });
}

/* ===== СТРОКА ===== */
function row(name, size, click, icon) {
  const div = document.createElement("div");
  div.className = "file";

  div.innerHTML = `
    <div class="name">
      <img src="${icon}" style="width:16px;height:16px;margin-right:6px;vertical-align:middle;">
      ${name}
    </div>
    <div class="size">${size}</div>
  `;

  div.onclick = click;
  return div;
}

/* ===== FLATTEN TREE ===== */
function flattenTree(node) {
  let arr = [];
  if (node.children) {
    node.children.forEach(child => {
      arr.push(child);
      if (child.children) arr = arr.concat(flattenTree(child));
    });
  }
  return arr;
}

/* ===== CONVERT SIZE TO BYTES ===== */
function sizeToBytes(sizeStr) {
  if (!sizeStr) return 0;
  const units = { B: 1, KB: 1024, MB: 1024*1024, GB: 1024*1024*1024 };
  const match = sizeStr.match(/([\d,.]+)\s*(B|KB|MB|GB)/i);
  if (!match) return parseFloat(sizeStr) || 0;
  let num = parseFloat(match[1].replace(',', '.'));
  let unit = match[2].toUpperCase();
  return num * (units[unit] || 1);
}

/* ===== SEARCH ===== */
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const container = document.getElementById("files");
  container.innerHTML = "";

  if (!root || !current) return;

  if (!q) {
    render(current); // пустой поиск — текущая папка
    return;
  }

  const allItems = flattenTree(root);
  allItems.forEach(item => {
    if (item.name.toLowerCase().includes(q)) {
      let icon = "file.png";
      if (item.type === "folder") icon = "folder.png";
      if (item.name.endsWith(".demo")) icon = "film.png";
      if (item.name.endsWith(".gho")) icon = "file.png";

      container.appendChild(
        row(
          item.name,
          item.size || "",
          () => { if (item.type === "folder") render(item); },
          icon
        )
      );
    }
  });
});

/* ===== CLEAR BUTTON ===== */
document.getElementById("clear").onclick = () => {
  searchInput.value = "";
  render(current);
};

/* ===== SORT BY NAME ===== */
document.getElementById("header-name").onclick = () => {
  if (!current || !current.children) return;

  current.children.sort((a, b) => {
    if (a.name.toLowerCase() < b.name.toLowerCase()) return nameAsc ? -1 : 1;
    if (a.name.toLowerCase() > b.name.toLowerCase()) return nameAsc ? 1 : -1;
    return 0;
  });
  nameAsc = !nameAsc;
  render(current);
};

/* ===== SORT BY SIZE ===== */
document.getElementById("header-size").onclick = () => {
  if (!current || !current.children) return;

  current.children.sort((a, b) => {
    const sizeA = sizeToBytes(a.size);
    const sizeB = sizeToBytes(b.size);
    return sizeAsc ? sizeA - sizeB : sizeB - sizeA;
  });
  sizeAsc = !sizeAsc;
  render(current);
};

/* ===== PARENT LINKS ===== */
function linkParents(node, parent=null) {
  node.parent = parent;
  if (node.children) {
    node.children.forEach(child => linkParents(child, node));
  }
}

/* ===== TOAST ===== */
function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 800);
}

/* ===== LOAD JSON ===== */
fetch("./structure.json")
  .then(r => r.json())
  .then(json => {
    root = json;
    linkParents(root);
    render(root);
  })
  .catch(err => {
    console.error(err);
    document.getElementById("files").innerHTML =
      "<div style='padding:20px;color:red'>Ошибка загрузки JSON</div>";
  });
</script>

</body>
</html>
