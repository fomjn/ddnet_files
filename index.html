<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<title>fomjn</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #111;
    color: #eee;
    padding: 20px;
  }

  h1.file-browser-header {
    font-size: 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
  }

  .header-logo {
    width: 32px;
    height: 32px;
    margin-right: 8px;
  }

  ul.folder-tree {
    list-style: none;
    padding-left: 20px;
  }

  ul.folder-tree li {
    margin: 2px 0;
    cursor: pointer;
    position: relative;
    padding-left: 5px;
  }

  ul.folder-tree li ul {
    display: none;
  }

  ul.folder-tree li.open > ul {
    display: block;
  }

  ul.folder-tree li.folder::before {
    content: "📁 ";
    margin-right: 5px;
  }

  ul.folder-tree li.file::before {
    content: "📄 ";
    margin-right: 5px;
  }

  ul.folder-tree li:hover {
    background-color: rgba(0,128,255,0.1);
  }

  .file-size {
    font-size: 0.8em;
    color: #999;
    margin-left: 8px;
  }

  .file-count {
    font-size: 0.85em;
    color: #ccc;
    margin-left: 4px;
  }
</style>
</head>
<body>

<h1 class="file-browser-header">
  <img src="logo.png" alt="logo" class="header-logo">
  fomjn
</h1>

<ul class="folder-tree" id="fileTree"></ul>

<script>
async function loadStructure() {
  const res = await fetch("structure.json");
  const data = await res.json();
  buildTree(document.getElementById("fileTree"), data);
}

function buildTree(container, structure) {
  Object.entries(structure).forEach(([key, value]) => {
    if (Array.isArray(value)) {
      value.forEach(file => {
        if (file.name.toLowerCase() === "desktop.ini") return;

        const li = document.createElement("li");
        li.classList.add("file");
        li.textContent = file.name;

        const size = document.createElement("span");
        size.className = "file-size";
        size.textContent = file.size;
        li.appendChild(size);

        container.appendChild(li);
      });
    } else {
      const li = document.createElement("li");
      li.classList.add("folder");
      li.textContent = key;

      const count = countFiles(value);
      const span = document.createElement("span");
      span.className = "file-count";
      span.textContent = `(${count})`;
      li.appendChild(span);

      const ul = document.createElement("ul");
      buildTree(ul, value);
      li.appendChild(ul);

      li.addEventListener("click", (e) => {
        e.stopPropagation();
        li.classList.toggle("open");
      });

      container.appendChild(li);
    }
  });
}

function countFiles(structure) {
  let total = 0;
  Object.values(structure).forEach(value => {
    if (Array.isArray(value)) {
      total += value.filter(f => f.name.toLowerCase() !== "desktop.ini").length;
    } else {
      total += countFiles(value);
    }
  });
  return total;
}

loadStructure();
</script>

</body>
</html>
