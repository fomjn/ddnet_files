<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" type="image/png" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #ddd;
  overflow: hidden;
}

/* ===== ФОН ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: url("bg_v3.png") repeat;
  background-size: 128px 128px;

  animation: moveBg 20s linear infinite;
  filter: brightness(0.35);

  z-index: -2;
}

@keyframes moveBg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* ===== ОСНОВНОЕ ОКНО ===== */
.container {
  width: 900px;
  height: 600px;
  margin: 40px auto;

  background: rgba(20, 20, 25, 0.85);
  border-radius: 6px;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);

  display: flex;
  flex-direction: column;
}

/* ===== ХЕДЕР ===== */
.header {
  display: flex;
  padding: 10px;
  background: linear-gradient(#5f6368, #3a3d42);
  color: #eee;
  font-weight: bold;
}

.header div {
  flex: 1;
}

/* ===== СПИСОК ===== */
.file-list {
  flex: 1;
  overflow-y: auto;
  padding: 5px 0;
}

/* ===== СТРОКА ===== */
.file {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  cursor: pointer;
}

.file:hover {
  background: rgba(255,255,255,0.05);
}

/* ВЫБРАННЫЙ ФАЙЛ */
.file.active {
  background: #dcdcdc;
  color: #000;
}

/* ===== ИКОНКИ ===== */
.icon {
  width: 18px;
  margin-right: 8px;
}

/* ===== КОЛОНКИ ===== */
.name { flex: 3; }
.length { flex: 1; }
.date { flex: 2; }

/* ===== ПОИСК ===== */
.search {
  display: flex;
  padding: 6px;
  background: #2a2d31;
}

.search input {
  width: 100%;
  padding: 6px;
  background: #1e1f22;
  border: none;
  color: #ccc;
}

/* === ДЕРЕВО === */
ul {
  list-style: none;
  padding-left: 20px;
}

li {
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
}

li:hover {
  background: rgba(255,255,255,0.05);
}

.folder::before {
  content: "📁 ";
}

.file::before {
  content: "📄 ";
}

/* === ФАЙЛЫ === */
.file {
  display: flex;
  justify-content: space-between;
  max-width: 700px;
}

.file.demo {
  color: #4aa3ff;
}

.file.gho {
  color: #c084fc;
}

.file-size {
  color: #888;
  margin-left: 10px;
}

/* === ПАПКИ === */
.folder > ul {
  display: none;
}

.folder.open > ul {
  display: block;
}

.file-count {
  color: #aaa;
  margin-left: 5px;
  font-size: 0.85em;
}

/* === УВЕДОМЛЕНИЕ КОПИРОВАНИЯ === */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px 15px;
  border-radius: 8px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="name">Demo</div>
    <div class="length">Length</div>
    <div class="date">Date</div>
  </div>

  <div id="files" class="file-list"></div>

  <div class="search">
    <input type="text" placeholder="Search">
  </div>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let structure = null;
let current = null;

async function load() {
  const res = await fetch("structure.json");
  structure = await res.json();
  current = structure;
  render(current.children);
}

function render(items) {
  const container = document.getElementById("files");
  container.innerHTML = "";

  // кнопка назад
  if (current !== structure) {
    const back = document.createElement("div");
    back.className = "file";
    back.innerHTML = `
      <div class="name">../</div>
      <div class="length"></div>
      <div class="date"></div>
    `;
    back.onclick = () => {
      current = current.parent;
      render(current.children);
    };
    container.appendChild(back);
  }

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "file";

    div.innerHTML = `
      <img class="icon" src="${item.type === 'folder' ? 'folder.png' : 'file.png'}">
      <div class="name">${item.name}</div>
      <div class="length">${item.size || ''}</div>
      <div class="date">${item.date || ''}</div>
    `;

    div.onclick = () => {
      document.querySelectorAll(".file").forEach(f => f.classList.remove("active"));
      div.classList.add("active");

      if (item.type === "folder") {
        current = item;
        render(item.children);
      }
    };

    container.appendChild(div);
  });
}

// parent ссылки
function addParents(node, parent=null) {
  node.parent = parent;
  if (node.children) {
    node.children.forEach(child => addParents(child, node));
  }
}

load().then(() => {
  addParents(structure);
});
</script>

</body>
</html>
