<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* { box-sizing: border-box; cursor: url("cursor.png") 0 0, auto !important; }

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  color: #ddd;
}

/* ===== ФОН ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);
  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* ===== КОНТЕЙНЕР ===== */
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  padding: 6px;
  background: rgba(42,45,49,0.6);
  backdrop-filter: blur(4px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.header-cell {
  flex: 1;
  padding: 6px;
  cursor: pointer;
  user-select: none;
  color: #ccc;
  border-radius: 4px;
}

.header-cell:hover {
  background: rgba(255,255,255,0.1);
}

/* ===== СПИСОК ===== */
.file-list {
  flex: 1;
  overflow-y: auto;
}

/* ===== СТРОКА ===== */
.file {
  display: flex;
  padding: 6px 10px;
}

.file:hover {
  background: rgba(255,255,255,0.08);
}

.file.active {
  background: #fff;
  color: #000;
}

/* ===== КОЛОНКИ ===== */
.name {
  flex: 3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.size { flex: 1; }

/* ===== SEARCH ===== */
.search {
  display: flex;
  align-items: center;
  padding: 6px;
  background: rgba(42,45,49,0.6);
  backdrop-filter: blur(4px);
}

.search img {
  width: 16px;
  margin-right: 6px;
}

.search input {
  flex: 1;
  padding: 6px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #ccc;
  outline: none;
  caret-color: #fff;
}

.search button {
  width: 24px;
  height: 24px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: #ccc;
  font-size: 16px;
  margin-left: 6px;
  border-radius: 4px;
}

.search button:hover {
  background: rgba(255,255,255,0.1);
}

/* ===== TOAST ===== */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show { opacity: 1; }
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div id="header-name" class="header-cell">Name</div>
    <div id="header-size" class="header-cell">Size</div>
  </div>

  <div id="files" class="file-list"></div>

  <div class="search">
    <img src="loupe.png">
    <input id="search" placeholder="Search">
    <button id="clear">×</button>
  </div>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let root = null;
let current = null;

let nameAsc = true;
let sizeAsc = true;

/* ===== SIZE PARSER ===== */
function parseSize(size) {
  if (!size) return 0;

  const parts = size.split(" ");
  const value = parseFloat(parts[0]);
  const unit = parts[1]?.toUpperCase();

  if (unit === "KB") return value * 1024;
  if (unit === "MB") return value * 1024 * 1024;
  if (unit === "GB") return value * 1024 * 1024 * 1024;

  return value;
}

/* ===== SORT INDICATORS ===== */
function updateSortIndicators(active, asc) {
  document.getElementById("header-name").textContent = "Name";
  document.getElementById("header-size").textContent = "Size";

  const arrow = asc ? " ▲" : " ▼";

  if (active === "name") {
    document.getElementById("header-name").textContent += arrow;
  } else {
    document.getElementById("header-size").textContent += arrow;
  }
}

/* ===== ROW ===== */
function row(name, size, click, icon = null) {
  const div = document.createElement("div");
  div.className = "file";

  div.innerHTML = `
    <div class="name">
      ${icon ? `<img src="${icon}" style="width:16px;height:16px;margin-right:6px;vertical-align:middle;">` : ""}
      ${name}
    </div>
    <div class="size">${size}</div>
  `;

  div.onclick = click;
  return div;
}

/* ===== RENDER ===== */
function render(folder) {
  const container = document.getElementById("files");
  container.innerHTML = "";
  current = folder;

  if (!folder.children) return;

  // назад
  if (folder.parent) {
    container.appendChild(
      row("..", "", () => render(folder.parent), "tree.png")
    );
  }

  folder.children.forEach(item => {

    if (item.type === "folder") {
      container.appendChild(
        row(item.name, "", () => render(item), "folder.png")
      );
    }

    else if (item.type === "file") {
      let icon = "file.png";

      if (item.name.endsWith(".demo")) icon = "film.png";
      if (item.name.endsWith(".gho")) icon = "file.png";

      container.appendChild(
        row(item.name, item.size || "", () => {
          navigator.clipboard.writeText(item.name);
          showToast();
        }, icon)
      );
    }

  });
}

/* ===== SEARCH ===== */
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  if (!q) return render(current);

  const container = document.getElementById("files");
  container.innerHTML = "";

  const all = flatten(root);

  all.forEach(item => {
    if (item.name.toLowerCase().includes(q)) {

      let icon = "file.png";
      if (item.type === "folder") icon = "folder.png";
      if (item.name.endsWith(".demo")) icon = "film.png";
      if (item.name.endsWith(".gho")) icon = "file.png";

      container.appendChild(
        row(item.name, item.size || "", () => {
          if (item.type === "folder") render(item);
        }, icon)
      );
    }
  });
});

/* ===== FLATTEN ===== */
function flatten(node) {
  let arr = [];
  if (node.children) {
    node.children.forEach(child => {
      arr.push(child);
      if (child.children) arr = arr.concat(flatten(child));
    });
  }
  return arr;
}

/* ===== CLEAR ===== */
document.getElementById("clear").onclick = () => {
  document.getElementById("search").value = "";
  render(current);
};

/* ===== SORT NAME ===== */
document.getElementById("header-name").onclick = () => {
  current.children.sort((a, b) => {
    if (a.type !== b.type) return a.type === "folder" ? -1 : 1;

    return nameAsc
      ? a.name.localeCompare(b.name)
      : b.name.localeCompare(a.name);
  });

  updateSortIndicators("name", nameAsc);
  nameAsc = !nameAsc;
  render(current);
};

/* ===== SORT SIZE ===== */
document.getElementById("header-size").onclick = () => {
  current.children.sort((a, b) => {
    return sizeAsc
      ? parseSize(a.size) - parseSize(b.size)
      : parseSize(b.size) - parseSize(a.size);
  });

  updateSortIndicators("size", sizeAsc);
  sizeAsc = !sizeAsc;
  render(current);
};

/* ===== PARENTS ===== */
function linkParents(node, parent=null) {
  node.parent = parent;
  if (node.children) {
    node.children.forEach(child => linkParents(child, node));
  }
}

/* ===== TOAST ===== */
function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 800);
}

/* ===== LOAD ===== */
fetch("./structure.json")
  .then(r => r.json())
  .then(json => {
    root = json;
    linkParents(root);
    render(root);
  });
</script>

</body>
</html>
