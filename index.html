<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  color: #ddd;
  cursor: url("cursor.png") 0 0, auto;
}

/* фикс курсора ВЕЗДЕ */
* { cursor: url("cursor.png") 0 0, auto !important; }

/* фон */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);

  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* контейнер */
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* header */
.header {
  display: flex;
  padding: 10px;
  background: linear-gradient(#5f6368, #3a3d42);
}

.header div { flex: 1; }

/* список */
.file-list {
  flex: 1;
  overflow-y: auto;
}

/* строка */
.file {
  display: flex;
  padding: 6px 10px;
}

.file:hover {
  background: rgba(255,255,255,0.1);
}

.file.active {
  background: #fff;
  color: #000;
}

/* колонки */
.name {
  flex: 3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.size { flex: 1; }
.date { flex: 2; }

/* поиск */
.search {
  padding: 6px;
  background: #2a2d31;
}

.search input {
  width: 100%;
  padding: 6px;
  background: #1e1f22;
  border: none;
  color: #ccc;
  outline: none;
}

/* toast */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show { opacity: 1; }
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div>Name</div>
    <div>Size</div>
    <div>Date</div>
  </div>

  <div id="files" class="file-list"></div>

  <div class="search">
    <input id="search" placeholder="Search">
  </div>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let data = null;
let path = [];
let currentItems = [];

/* ===== НАВИГАЦИЯ ===== */
function getFolder() {
  let cur = data;
  for (let p of path) cur = cur[p];
  return cur;
}

/* ===== РЕНДЕР ===== */
function render() {
  const container = document.getElementById("files");
  container.innerHTML = "";

  const folder = getFolder();
  currentItems = [];

  // назад
  if (path.length) {
    const back = createRow("📁 ../", "", "", () => {
      path.pop();
      render();
    });
    container.appendChild(back);
  }

  // папки
  for (let key in folder) {
    if (key === "_files") continue;

    currentItems.push({name: key, type: "folder"});

    const row = createRow("📁 " + key, "", "", () => {
      path.push(key);
      render();
    });

    container.appendChild(row);
  }

  // файлы
  if (folder._files) {
    folder._files.forEach(f => {
      currentItems.push({name: f.name, type: "file"});

      const row = createRow("📄 " + f.name, f.size, f.date, () => {
        navigator.clipboard.writeText(f.name);
        showToast();
      });

      container.appendChild(row);
    });
  }
}

/* ===== СТРОКА ===== */
function createRow(name, size, date, click) {
  const div = document.createElement("div");
  div.className = "file";

  div.innerHTML = `
    <div class="name">${name}</div>
    <div class="size">${size || ""}</div>
    <div class="date">${date || ""}</div>
  `;

  div.onclick = click;
  return div;
}

/* ===== ПОИСК ===== */
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const container = document.getElementById("files");
  container.innerHTML = "";

  const folder = getFolder();

  // фильтр папок
  for (let key in folder) {
    if (key === "_files") continue;
    if (key.toLowerCase().includes(q)) {
      container.appendChild(createRow("📁 " + key, "", "", () => {
        path.push(key);
        render();
      }));
    }
  }

  // фильтр файлов
  if (folder._files) {
    folder._files.forEach(f => {
      if (f.name.toLowerCase().includes(q)) {
        container.appendChild(createRow("📄 " + f.name, f.size, f.date, () => {
          navigator.clipboard.writeText(f.name);
          showToast();
        }));
      }
    });
  }
});

/* ===== TOAST ===== */
function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 800);
}

/* ===== ЗАГРУЗКА ===== */
fetch("structure.json")
  .then(r => r.json())
  .then(json => {
    data = json;
    render();
  });
</script>

</body>
</html>
