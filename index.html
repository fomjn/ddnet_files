<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* {
  box-sizing: border-box;
  cursor: url("cursor.png") 0 0, auto !important;
  user-select: none;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  color: #ddd;
  overflow: hidden;
}

/* ===== ФОН ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);
  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  display: flex;
  padding: 8px 120px 8px 12px;
  background: rgba(255,255,255,0.06);
  z-index: 5;
}

.header-cell {
  padding: 6px;
  cursor: pointer;
}
.header-cell:hover {
  background: rgba(255,255,255,0.15);
}

.header-name { flex: 3; }
.header-size { flex: 1; max-width: 120px; text-align: right; }

/* ===== СПИСОК ===== */
.file-list {
  height: calc(100% - 90px);
  overflow-y: auto;
}

.file {
  display: flex;
  padding: 10px 12px;
}
.file:hover { background: rgba(255,255,255,0.08); }
.file.active { background: rgba(255,255,255,0.18); }

.name {
  flex: 3;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.size {
  flex: 1;
  max-width: 120px;
  text-align: right;
  color: #aaa;
}

.progress {
  margin-left: auto;
  margin-right: 10px;
  font-size: 0.9em;
}

.green { color: #4cff7a; }
.yellow { color: #ffd24c; }
.red { color: #ff5c5c; }

.icon {
  width: 18px;
  height: 18px;
  margin-right: 8px;
  object-fit: contain;
}

/* ===== SEARCH ===== */
.search {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  padding: 8px;
  background: rgba(255,255,255,0.06);
}

.search img {
  width: 18px;
  height: 18px;
  min-width: 18px;
  object-fit: contain;
  margin-right: 6px;
}

.search input {
  flex: 1;
  padding: 6px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #ccc;
}

.search button {
  background: none;
  border: none;
  color: #aaa;
  font-size: 18px;
  cursor: pointer;
}
.search button:hover { color: #fff; }

/* ===== MUSIC ===== */
.music-btn {
  position: fixed;
  top: 10px;
  right: 12px;
  width: 28px;
  z-index: 20;
}

.music-panel {
  position: fixed;
  top: 50px;
  right: 12px;
  width: 180px;
  background: rgba(255,255,255,0.06);
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 10px;
  z-index: 20;
}
.music-panel.show { display: flex; }

/* ===== TOAST ===== */
.copy-toast {
  position: fixed;
  bottom: 60px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
}
.copy-toast.show { opacity: 1; }

</style>
</head>

<body>

<img id="musicToggle" class="music-btn" src="music.png">

<div id="musicPanel" class="music-panel">
  <img id="musicPlay" src="play.png" width="24">
  <input id="volume" type="range" min="0" max="1" step="0.01">
</div>

<audio id="music" loop>
  <source src="music_menu.mp3">
</audio>

<div class="header">
  <div id="header-name" class="header-cell header-name">Name</div>
  <div id="header-size" class="header-cell header-size">Size</div>
</div>

<div id="files" class="file-list"></div>

<div class="search">
  <img src="loupe.png">
  <input id="search" placeholder="Search">
  <button id="clear">×</button>
</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let root, current, selected;
let currentPath = "";

/* ===== DDNET LINKS ===== */
const ddnetLinks = {
  "AIB Quest 4": "https://ddnet.org/maps/AIB-32-Quest-32-4",
  "Aufnahmetest 2": "https://ddnet.org/maps/Aufnahmetest-32-2",
  "Aufnahmetest 3": "https://ddnet.org/maps/Aufnahmetest-32-3",
  "Aufnahmetest": "https://ddnet.org/maps/Aufnahmetest",
  "DatWay": "https://ddnet.org/maps/DatWay"
};

function getMapName(name){
  return name.split("_")[0];
}

/* ===== РЕНДЕР ===== */
function render(folder, path=""){
  const el = document.getElementById("files");
  el.innerHTML = "";
  current = folder;
  currentPath = path;

  if (folder.parent) {
    const newPath = path.split("/").slice(0, -1).join("/");
    el.appendChild(row("../", "", "", () => render(folder.parent, newPath), "tree.png"));
  }

  folder.children.forEach(item => {
    let icon = "file.png";
    if (item.type === "folder") icon = "folder.png";
    if (item.name.endsWith(".demo")) icon = "film.png";

    el.appendChild(
      row(item.name, item.size || "", "", () => {
        if (item.type === "folder") {
          render(item, path + "/" + item.name);
        } else {
          if (path.includes("demos") && path.includes("Rank 1s")) {
            const map = getMapName(item.name);
            if (ddnetLinks[map]) {
              window.open(ddnetLinks[map], "_blank");
              return;
            }
          }
          copy(item.name);
        }
      }, icon)
    );
  });
}

/* ===== ROW ===== */
function row(name, size, progress, action, icon) {
  const d = document.createElement("div");
  d.className = "file";

  d.innerHTML = `
    <div class="name">
      <img class="icon" src="${icon}">
      ${name}
      ${progress || ""}
    </div>
    <div class="size">${size || ""}</div>
  `;

  d.onclick = () => {
    if (selected) selected.classList.remove("active");
    d.classList.add("active");
    selected = d;
  };

  d.ondblclick = action;
  return d;
}

/* ===== SEARCH ===== */
const searchInput = document.getElementById("search");

searchInput.oninput = e => {
  const q = e.target.value.toLowerCase();
  const el = document.getElementById("files");
  el.innerHTML = "";

  if (!q) {
    render(current, currentPath);
    return;
  }

  flatten(root).forEach(item => {
    if (
      item.type === "file" &&
      (item.name.endsWith(".demo") || item.name.endsWith(".gho")) &&
      item.name.toLowerCase().includes(q)
    ) {
      let icon = item.name.endsWith(".demo") ? "film.png" : "file.png";

      el.appendChild(
        row(item.name, item.size || "", "", () => {
          copy(item.name);
        }, icon)
      );
    }
  });
};

document.getElementById("clear").onclick = () => {
  searchInput.value = "";
  render(current, currentPath);
};

/* ===== FLATTEN ===== */
function flatten(node) {
  let arr = [];
  if (node.children) {
    node.children.forEach(child => {
      if (child.type === "file") arr.push(child);
      if (child.children) arr = arr.concat(flatten(child));
    });
  }
  return arr;
}

/* ===== COPY ===== */
function copy(text) {
  navigator.clipboard.writeText(text);
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 800);
}

/* ===== MUSIC ===== */
const music = document.getElementById("music");
const playBtn = document.getElementById("musicPlay");

let playing = localStorage.getItem("playing") === "true";

if (playing) {
  playBtn.src = "pause.png";
  document.addEventListener("click", () => {
    if (music.paused) music.play().catch(()=>{});
  }, { once: true });
} else {
  playBtn.src = "play.png";
}

playBtn.onclick = () => {
  if (music.paused) {
    music.play();
    playBtn.src = "pause.png";
    playing = true;
  } else {
    music.pause();
    playBtn.src = "play.png";
    playing = false;
  }
  localStorage.setItem("playing", playing);
};

/* ===== LOAD ===== */
function addParents(node, parent=null) {
  node.parent = parent;
  if (node.children) {
    node.children.forEach(child => addParents(child, node));
  }
}

fetch("structure.json")
.then(r => r.json())
.then(data => {
  root = data;
  addParents(root);
  render(root);
});
</script>

</body>
</html>
