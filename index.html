<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* {
  box-sizing: border-box;
  cursor: url("cursor.png") 0 0, auto !important;
  user-select: none;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  color: #ddd;
  overflow: hidden;
}

/* ===== ФОН ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);
  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  padding: 8px 140px 8px 12px;
  background: rgba(255,255,255,0.06);
}

.header-name { flex: 3; }
.header-size { flex: 1; max-width: 120px; text-align: right; }

.header-cell {
  padding: 6px;
  cursor: pointer;
}

.header-cell:hover {
  background: rgba(255,255,255,0.15);
}

/* ===== СПИСОК ===== */
.file-list {
  height: calc(100% - 90px);
  overflow-y: auto;
}

/* ===== СТРОКА ===== */
.file {
  display: flex;
  padding: 10px 12px;
}

.file:hover {
  background: rgba(255,255,255,0.08);
}

.file.active {
  background: rgba(255,255,255,0.18);
}

.name { flex: 3; overflow: hidden; white-space: nowrap; }
.size { flex: 1; max-width: 120px; text-align: right; color: #aaa; }

.icon {
  width: 18px;
  height: 18px;
  object-fit: contain;
  margin-right: 8px;
}

/* ===== SEARCH ===== */
.search {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  align-items: center;
  padding: 8px 10px;
  background: rgba(255,255,255,0.06);
}

.search img {
  width: 16px;
  height: 16px;
  object-fit: contain;
  margin-right: 6px;
}

.search input {
  flex: 1;
  padding: 6px 8px;
  height: 28px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #ccc;
}

.search button {
  background: transparent;
  border: none;
  color: #aaa;
  font-size: 18px;
  cursor: pointer;
}

.search button:hover {
  color: #fff;
}

/* ===== MUSIC ===== */
.music-btn {
  position: fixed;
  top: 10px;
  right: 12px;
  width: 28px;
  z-index: 10;
}

.music-panel {
  position: fixed;
  top: 50px;
  right: 12px;
  width: 180px;
  background: rgba(255,255,255,0.06);
  padding: 10px;
  border-radius: 6px;
  display: none;
  flex-direction: column;
  gap: 10px;
}

.music-panel.show {
  display: flex;
}

.music-play {
  width: 24px;
  cursor: pointer;
}

.volume {
  width: 100%;
}

/* ===== TOAST ===== */
.copy-toast {
  position: fixed;
  bottom: 60px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show { opacity: 1; }

</style>
</head>

<body>

<img id="musicToggle" class="music-btn" src="music.png">

<div id="musicPanel" class="music-panel">
  <img id="musicPlay" class="music-play" src="play.png">
  <input id="volume" class="volume" type="range" min="0" max="1" step="0.01">
</div>

<audio id="music" loop>
  <source src="music_menu.mp3" type="audio/mpeg">
</audio>

<div class="header">
  <div id="header-name" class="header-cell header-name">Name</div>
  <div id="header-size" class="header-cell header-size">Size</div>
</div>

<div id="files" class="file-list"></div>

<div class="search">
  <img src="loupe.png">
  <input id="search" placeholder="Search">
  <button id="clear">×</button>
</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let root, current, selected;
let currentPath = "";

const ddnetLinks = {
  "AIB Quest 4": "https://ddnet.org/maps/AIB-32-Quest-32-4",
  "Aufnahmetest 2": "https://ddnet.org/maps/Aufnahmetest-32-2",
  "Aufnahmetest 3": "https://ddnet.org/maps/Aufnahmetest-32-3",
  "Aufnahmetest": "https://ddnet.org/maps/Aufnahmetest",
  "DatWay": "https://ddnet.org/maps/DatWay"
};

function getMapName(name){
  return name.split("_")[0];
}

/* ===== РЕНДЕР ===== */
function render(folder, path=""){
  const el = document.getElementById("files");
  el.innerHTML="";
  current=folder;
  currentPath = path;

  if(folder.parent){
    el.appendChild(row("../","",()=>render(folder.parent, path.split("/").slice(0,-1).join("/")),"tree.png"));
  }

  folder.children.forEach(item=>{
    let icon="file.png";
    if(item.type==="folder") icon="folder.png";
    if(item.name.endsWith(".demo")) icon="film.png";

    el.appendChild(row(item.name,item.size,()=>{
      if(item.type==="folder"){
        render(item, path + "/" + item.name);
      }else{
        // только если в demos
        if(path.includes("demos")){
          const map = getMapName(item.name);
          if(ddnetLinks[map]){
            window.open(ddnetLinks[map], "_blank");
            return;
          }
        }
        copy(item.name);
      }
    },icon));
  });
}

/* ===== ROW ===== */
function row(name,size,action,icon){
  const d=document.createElement("div");
  d.className="file";

  d.innerHTML=`
    <div class="name"><img class="icon" src="${icon}">${name}</div>
    <div class="size">${size||""}</div>
  `;

  d.onclick=()=>{
    if(selected) selected.classList.remove("active");
    d.classList.add("active");
    selected=d;
  };

  d.ondblclick=action;
  return d;
}

/* ===== COPY ===== */
function copy(t){
  navigator.clipboard.writeText(t);
  const toast=document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),800);
}

/* ===== MUSIC ===== */
const music=document.getElementById("music");
const toggle=document.getElementById("musicToggle");
const panel=document.getElementById("musicPanel");
const playBtn=document.getElementById("musicPlay");
const volume=document.getElementById("volume");

volume.value = localStorage.getItem("vol") || 0.4;
music.volume = volume.value;

let shouldPlay = localStorage.getItem("playing")==="true";
let playing = false;

/* фикс автоплея */
if(shouldPlay){
  document.addEventListener("click", () => {
    if(!playing){
      music.play().then(()=>{
        playBtn.src="pause.png";
        playing=true;
      }).catch(()=>{});
    }
  }, { once: true });
}

toggle.onclick=()=> panel.classList.toggle("show");

document.addEventListener("click", e=>{
  if(!panel.contains(e.target) && e.target!==toggle){
    panel.classList.remove("show");
  }
});

playBtn.onclick=()=>{
  if(!playing){
    music.play().catch(()=>{});
    playBtn.src="pause.png";
    playing=true;
  }else{
    music.pause();
    playBtn.src="play.png";
    playing=false;
  }
  localStorage.setItem("playing", playing);
};

volume.oninput=()=>{
  music.volume=volume.value;
  localStorage.setItem("vol", volume.value);
};

/* ===== LOAD ===== */
function link(n,p=null){
  n.parent=p;
  if(n.children) n.children.forEach(c=>link(c,n));
}

fetch("structure.json")
.then(r=>r.json())
.then(data=>{
  root=data;
  link(root);
  render(root);
});
</script>

</body>
</html>
