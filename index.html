<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* {
  box-sizing: border-box;
  cursor: url("cursor.png") 0 0, auto !important;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  color: #ddd;
}

/* ===== ФОН ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);
  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* ===== КОНТЕЙНЕР ===== */
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  padding: 6px 10px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(4px);
}

.header-cell {
  flex: 1;
  padding: 6px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.header-cell:hover {
  background: rgba(255,255,255,0.12);
}

.header-cell.active {
  background: rgba(255,255,255,0.15);
}

/* ===== СПИСОК ===== */
.file-list {
  flex: 1;
  overflow-y: auto;
}

/* ===== СТРОКА ===== */
.file {
  display: flex;
  padding: 6px 10px;
  transition: background 0.15s;
}

.file:hover {
  background: rgba(255,255,255,0.06);
}

.file.active {
  background: rgba(255,255,255,0.18);
  color: #fff;
}

/* ===== КОЛОНКИ ===== */
.name {
  flex: 3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.size {
  flex: 1;
  color: #aaa;
}

/* ===== SEARCH ===== */
.search {
  display: flex;
  align-items: center;
  padding: 6px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(4px);
}

.search img {
  width: 16px;
  margin-right: 6px;
}

.search input {
  flex: 1;
  padding: 6px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #ccc;
  outline: none;
}

.search button {
  width: 24px;
  height: 24px;
  margin-left: 6px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #ccc;
  cursor: pointer;
  border-radius: 4px;
}

.search button:hover {
  background: rgba(255,255,255,0.15);
}

/* ===== TOAST ===== */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show { opacity: 1; }

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div id="header-name" class="header-cell">Name</div>
    <div id="header-size" class="header-cell">Size</div>
  </div>

  <div id="files" class="file-list"></div>

  <div class="search">
    <img src="loupe.png">
    <input id="search" placeholder="Search">
    <button id="clear">×</button>
  </div>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let root = null;
let current = null;

let selectedElement = null;
let sortMode = null;
let sortAsc = true;

/* ===== SIZE PARSER ===== */
function parseSize(size) {
  if (!size) return 0;

  let [num, unit] = size.split(" ");
  num = parseFloat(num);

  if (unit === "KB") return num;
  if (unit === "MB") return num * 1024;
  if (unit === "GB") return num * 1024 * 1024;

  return num;
}

/* ===== РЕНДЕР ===== */
function render(folder) {
  const container = document.getElementById("files");
  container.innerHTML = "";
  current = folder;

  let items = [...folder.children];

  if (sortMode === "name") {
    items.sort((a,b) => sortAsc
      ? a.name.localeCompare(b.name)
      : b.name.localeCompare(a.name));
  }

  if (sortMode === "size") {
    items.sort((a,b) => sortAsc
      ? parseSize(a.size) - parseSize(b.size)
      : parseSize(b.size) - parseSize(a.size));
  }

  // НАЗАД
  if (folder.parent) {
    container.appendChild(createRow("../", "", () => render(folder.parent), "tree.png"));
  }

  items.forEach(item => {
    let icon = "file.png";
    if (item.type === "folder") icon = "folder.png";
    if (item.name.endsWith(".demo")) icon = "film.png";

    const row = createRow(item.name, item.size || "", () => {
      if (item.type === "folder") render(item);
      else copy(item.name);
    }, icon);

    container.appendChild(row);
  });
}

/* ===== СТРОКА ===== */
function createRow(name, size, action, icon) {
  const div = document.createElement("div");
  div.className = "file";

  div.innerHTML = `
    <div class="name">
      <img src="${icon}" width="16" style="margin-right:6px;">
      ${name}
    </div>
    <div class="size">${size}</div>
  `;

  div.onclick = () => {
    if (selectedElement) selectedElement.classList.remove("active");
    div.classList.add("active");
    selectedElement = div;
  };

  div.ondblclick = action;

  return div;
}

/* ===== SEARCH ===== */
const searchInput = document.getElementById("search");

searchInput.oninput = e => {
  const q = e.target.value.toLowerCase();

  if (!q) {
    render(current);
    return;
  }

  const all = flatten(root);
  const container = document.getElementById("files");
  container.innerHTML = "";

  all.forEach(item => {
    if (item.name.toLowerCase().includes(q)) {
      let icon = item.type === "folder" ? "folder.png" : "file.png";
      if (item.name.endsWith(".demo")) icon = "film.png";

      container.appendChild(createRow(item.name, item.size, () => {}, icon));
    }
  });
};

/* КНОПКА ОЧИСТКИ */
document.getElementById("clear").onclick = () => {
  searchInput.value = "";
  render(current);
};

/* ===== FLATTEN ===== */
function flatten(node) {
  let arr = [];
  if (node.children) {
    node.children.forEach(c => {
      arr.push(c);
      if (c.children) arr = arr.concat(flatten(c));
    });
  }
  return arr;
}

/* ===== SORT ===== */
function setActiveHeader(id) {
  document.querySelectorAll(".header-cell").forEach(h => h.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

document.getElementById("header-name").onclick = () => {
  sortMode = "name";
  sortAsc = !sortAsc;
  setActiveHeader("header-name");
  render(current);
};

document.getElementById("header-size").onclick = () => {
  sortMode = "size";
  sortAsc = !sortAsc;
  setActiveHeader("header-size");
  render(current);
};

/* ===== COPY ===== */
function copy(text) {
  navigator.clipboard.writeText(text);
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 800);
}

/* ===== PARENTS ===== */
function link(node, parent=null) {
  node.parent = parent;
  if (node.children) node.children.forEach(c => link(c, node));
}

/* ===== LOAD ===== */
fetch("./structure.json")
  .then(r => r.json())
  .then(data => {
    root = data;
    link(root);
    render(root);
  });
</script>

</body>
</html>
