<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* {
  box-sizing: border-box;
  cursor: url("cursor.png") 0 0, auto !important;
  user-select: none; /* УБРАЛИ ВЫДЕЛЕНИЕ */
}

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  color: #ddd;
  overflow: hidden;
  touch-action: none; /* важно для телефона */
}

/* ===== ФОН ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);
  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* ===== КОНТЕЙНЕР ===== */
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  padding: 6px 10px;
  background: rgba(255,255,255,0.06);
}

.header-cell {
  flex: 1;
  padding: 6px;
  cursor: pointer;
}

.header-cell:hover {
  background: rgba(255,255,255,0.12);
}

.header-cell.active {
  background: rgba(255,255,255,0.15);
}

/* ===== СПИСОК ===== */
.file-list {
  flex: 1;
  overflow: hidden;
}

/* ===== СТРОКА ===== */
.file {
  display: flex;
  padding: 10px;
  font-size: 16px;
}

.file:hover {
  background: rgba(255,255,255,0.06);
}

.file.active {
  background: rgba(255,255,255,0.18);
}

/* ===== КОЛОНКИ ===== */
.name {
  flex: 3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.size {
  flex: 1;
  color: #aaa;
}

/* ===== SEARCH ===== */
.search {
  display: flex;
  padding: 8px;
  background: rgba(255,255,255,0.06);
}

.search input {
  flex: 1;
  padding: 8px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #ccc;
}

.search button {
  margin-left: 6px;
}

/* ===== TOAST ===== */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show { opacity: 1; }

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div id="header-name" class="header-cell">Name</div>
    <div id="header-size" class="header-cell">Size</div>
  </div>

  <div id="files" class="file-list"></div>

  <div class="search">
    <input id="search" placeholder="Search">
    <button id="clear">×</button>
  </div>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let root = null;
let current = null;
let selectedElement = null;

let lastTap = 0;

/* ===== SIZE ===== */
function parseSize(size) {
  if (!size) return 0;
  let [num, unit] = size.split(" ");
  num = parseFloat(num);
  if (unit === "MB") return num * 1024;
  return num;
}

/* ===== РЕНДЕР ===== */
function render(folder) {
  const container = document.getElementById("files");
  container.innerHTML = "";
  current = folder;

  if (folder.parent) {
    container.appendChild(createRow("../", "", () => render(folder.parent), "tree.png"));
  }

  folder.children.forEach(item => {
    let icon = item.type === "folder" ? "folder.png" : "file.png";
    if (item.name.endsWith(".demo")) icon = "film.png";

    container.appendChild(createRow(item.name, item.size, () => {
      if (item.type === "folder") render(item);
      else copy(item.name);
    }, icon));
  });
}

/* ===== ROW ===== */
function createRow(name, size, action, icon) {
  const div = document.createElement("div");
  div.className = "file";

  div.innerHTML = `
    <div class="name">
      <img src="${icon}" width="16"> ${name}
    </div>
    <div class="size">${size || ""}</div>
  `;

  div.addEventListener("click", e => {
    if (selectedElement) selectedElement.classList.remove("active");
    div.classList.add("active");
    selectedElement = div;

    const now = Date.now();
    if (now - lastTap < 300) {
      action();
    }
    lastTap = now;
  });

  return div;
}

/* ===== SEARCH ===== */
document.getElementById("search").oninput = e => {
  const q = e.target.value.toLowerCase();
  if (!q) return render(current);

  const container = document.getElementById("files");
  container.innerHTML = "";

  const all = flatten(root);

  all.forEach(item => {
    if (item.name.toLowerCase().includes(q)) {
      container.appendChild(createRow(item.name, item.size, () => {}, "file.png"));
    }
  });
};

document.getElementById("clear").onclick = () => {
  document.getElementById("search").value = "";
  render(current);
};

/* ===== FLATTEN ===== */
function flatten(node) {
  let arr = [];
  if (node.children) {
    node.children.forEach(c => {
      arr.push(c);
      if (c.children) arr = arr.concat(flatten(c));
    });
  }
  return arr;
}

/* ===== SCROLL ===== */
const list = document.getElementById("files");

let isDown = false;
let startY = 0;
let scrollTop = 0;
let velocity = 0;
let lastY = 0;

/* мышь */
list.addEventListener("mousedown", e => {
  isDown = true;
  startY = e.clientY;
  scrollTop = list.scrollTop;
});

document.addEventListener("mouseup", () => isDown = false);

document.addEventListener("mousemove", e => {
  if (!isDown) return;
  list.scrollTop = scrollTop - (e.clientY - startY);
});

/* телефон */
list.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
  scrollTop = list.scrollTop;
});

list.addEventListener("touchmove", e => {
  const y = e.touches[0].clientY;
  list.scrollTop = scrollTop - (y - startY);
});

/* ===== COPY ===== */
function copy(text) {
  navigator.clipboard.writeText(text);
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 800);
}

/* ===== PARENTS ===== */
function link(node, parent=null) {
  node.parent = parent;
  if (node.children) node.children.forEach(c => link(c, node));
}

/* ===== LOAD ===== */
fetch("./structure.json")
  .then(r => r.json())
  .then(data => {
    root = data;
    link(root);
    render(root);
  });

</script>

</body>
</html>
