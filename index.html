<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="assets/images/logo.png">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<img id="musicToggle" class="music-btn" src="assets/images/music.png">

<div id="musicPanel" class="music-panel">
  <img id="musicPlay" src="assets/images/play.png" width="24">
  <input id="volume" type="range" min="0" max="1" step="0.01">
</div>

<audio id="music" loop>
  <source src="assets/audio/music.mp3">
</audio>

<div class="header">
  <div id="header-name" class="header-cell header-name">Name</div>
  <div id="header-size" class="header-cell header-size">Size</div>
</div>

<div id="files" class="file-list"></div>

<div class="search">
  <img src="assets/images/loupe.png">
  <input id="search" placeholder="Search">
  <button id="clear">×</button>
</div>

<div id="toast" class="copy-toast">Copied</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
