<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" href="logo.png">

<style>
* {
  box-sizing: border-box;
  cursor: url("cursor.png") 0 0, auto !important;
  user-select: none;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  color: #ddd;
  overflow: hidden;
}

/* ===== ФОН ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bg_v3.png") repeat;
  background-size: 128px;
  animation: bg 6s linear infinite;
  filter: brightness(0.25);
  z-index: -1;
}

@keyframes bg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  display: flex;
  padding: 8px 160px 8px 12px;
  background: rgba(255,255,255,0.06);
  z-index: 5;
}

.header-cell {
  padding: 6px;
  cursor: pointer;
}
.header-cell:hover {
  background: rgba(255,255,255,0.15);
}

.header-name { flex: 3; }
.header-size { flex: 1; max-width: 120px; text-align: right; }

/* ===== LIST ===== */
.file-list {
  height: calc(100% - 90px);
  overflow-y: auto;
}

.file {
  display: flex;
  padding: 10px 12px;
}
.file:hover { background: rgba(255,255,255,0.08); }
.file.active { background: rgba(255,255,255,0.18); }

.name {
  flex: 3;
  display: flex;
  align-items: center;
}

.size {
  flex: 1;
  max-width: 120px;
  text-align: right;
  color: #aaa;
}

.progress {
  margin-left: auto;
  margin-right: 10px;
  font-size: 0.9em;
}

.green { color: #4cff7a; }
.yellow { color: #ffd24c; }
.red { color: #ff5c5c; }

.icon {
  width: 18px;
  height: 18px;
  margin-right: 8px;
  object-fit: contain;
}

/* ===== SEARCH ===== */
.search {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  padding: 8px;
  background: rgba(255,255,255,0.06);
}

.search img {
  width: 18px;
  height: 18px;
  margin-right: 6px;
}

.search input {
  flex: 1;
  padding: 6px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #ccc;
}

.search button {
  background: none;
  border: none;
  color: #aaa;
  font-size: 18px;
  cursor: pointer;
}
.search button:hover { color: #fff; }

/* ===== MUSIC ===== */
.music-btn {
  position: fixed;
  top: 10px;
  right: 12px;
  width: 28px;
  z-index: 10;
}

.music-panel {
  position: fixed;
  top: 50px;
  right: 12px;
  width: 180px;
  background: rgba(255,255,255,0.06);
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 10px;
  z-index: 10;
}
.music-panel.show { display: flex; }

/* ===== TOAST ===== */
.copy-toast {
  position: fixed;
  bottom: 60px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
}
.copy-toast.show { opacity: 1; }

</style>
</head>

<body>

<img id="musicToggle" class="music-btn" src="music.png">

<div id="musicPanel" class="music-panel">
  <img id="musicPlay" src="play.png" width="24">
  <input id="volume" type="range" min="0" max="1" step="0.01">
</div>

<audio id="music" loop>
  <source src="music_menu.mp3">
</audio>

<div class="header">
  <div id="header-name" class="header-cell header-name">Name</div>
  <div id="header-size" class="header-cell header-size">Size</div>
</div>

<div id="files" class="file-list"></div>

<div class="search">
  <img src="loupe.png">
  <input id="search" placeholder="Search">
  <button id="clear">×</button>
</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let root, current, selected;
let currentPath = "";
let nameAsc = true;
let sizeAsc = true;

/* лимиты */
const mapLimits = {
  "demos/DDNet/1 - Solo": 420,
  "demos/DDNet/2 - Race": 126,
  "demos/DDROCK/1 - Solo": 44,
  "demos/DDROCK/2 - Race": 53,
  "demos/KoG/1 - Solo": 33,
  "demos/Unique/1 - Short": 451,
  "demos/Unique/2 - Middle": 61,
  "demos/Unique/3 - Long": 40,
  "demos/Unique/4 - Fastcap": 86
};

/* DDNET LINKS */
const ddnetLinks = {
  "AIB Quest 4": "https://ddnet.org/maps/AIB-32-Quest-32-4",
  "Aufnahmetest 2": "https://ddnet.org/maps/Aufnahmetest-32-2",
  "Aufnahmetest 3": "https://ddnet.org/maps/Aufnahmetest-32-3",
  "Aufnahmetest": "https://ddnet.org/maps/Aufnahmetest",
  "DatWay": "https://ddnet.org/maps/DatWay"
};

function getMapName(name){
  return name.split("_")[0];
}

/* счет */
function countFiles(folder){
  return folder.children?.filter(f=>f.type==="file").length || 0;
}

function countAll(folder){
  let c=0;
  if(folder.children){
    folder.children.forEach(f=>{
      if(f.type==="file") c++;
      else c+=countAll(f);
    });
  }
  return c;
}

/* цвет */
function getColor(cur,max){
  const p=cur/max;
  if(p>=1) return "green";
  if(p>=0.7) return "yellow";
  return "red";
}

/* render */
function render(folder, path=""){
  const el=document.getElementById("files");
  el.innerHTML="";
  current=folder;
  currentPath=path;

  if(folder.parent){
    el.appendChild(row("../","",()=>render(folder.parent,path.split("/").slice(0,-1).join("/")),"tree.png"));
  }

  folder.children.forEach(item=>{
    let progressHTML="";

    if(item.type==="folder"){
      const full=(path+"/"+item.name).replace(/^\/+/,"");
      let count = path==="" ? countAll(item) : countFiles(item);
      let max = mapLimits[full];

      if(max){
        const cls=getColor(count,max);
        progressHTML=`<span class="progress ${cls}">(${count}/${max})</span>`;
      } else if(count>0){
        progressHTML=`<span class="progress">(${count})</span>`;
      }
    }

    let icon="file.png";
    if(item.type==="folder") icon="folder.png";
    if(item.name.endsWith(".demo")) icon="film.png";

    el.appendChild(row(item.name,item.size,progressHTML,()=>{
      if(item.type==="folder"){
        render(item,path+"/"+item.name);
      }else{
        if(path.includes("demos") && path.includes("Rank 1s")){
          const map=getMapName(item.name);
          if(ddnetLinks[map]){
            window.open(ddnetLinks[map],"_blank");
            return;
          }
        }
        copy(item.name);
      }
    },icon));
  });
}

/* row */
function row(name,size,progress,action,icon){
  const d=document.createElement("div");
  d.className="file";

  d.innerHTML=`
    <div class="name">
      <img class="icon" src="${icon}">
      ${name}
      ${progress||""}
    </div>
    <div class="size">${size||""}</div>
  `;

  d.onclick=()=>{
    if(selected) selected.classList.remove("active");
    d.classList.add("active");
    selected=d;
  };

  d.ondblclick=action;
  return d;
}

/* ===== ПОИСК ===== */
const searchInput=document.getElementById("search");

searchInput.oninput=e=>{
  const q=e.target.value.toLowerCase();

  if(!q){
    render(current,currentPath);
    return;
  }

  const el=document.getElementById("files");
  el.innerHTML="";

  flatten(root).forEach(item=>{
    if(item.name.toLowerCase().includes(q)){
      let icon=item.type==="folder"?"folder.png":"file.png";
      if(item.name.endsWith(".demo")) icon="film.png";

      el.appendChild(row(item.name,item.size,"",()=>{
        if(item.type==="folder") render(item);
      },icon));
    }
  });
};

document.getElementById("clear").onclick=()=>{
  searchInput.value="";
  render(current,currentPath);
};

/* flatten */
function flatten(n){
  let arr=[];
  if(n.children){
    n.children.forEach(c=>{
      arr.push(c);
      if(c.children) arr=arr.concat(flatten(c));
    });
  }
  return arr;
}

/* copy */
function copy(t){
  navigator.clipboard.writeText(t);
  const toast=document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),800);
}

/* ===== МУЗЫКА ===== */
const music=document.getElementById("music");
const toggle=document.getElementById("musicToggle");
const panel=document.getElementById("musicPanel");
const playBtn=document.getElementById("musicPlay");
const volume=document.getElementById("volume");

volume.value=localStorage.getItem("vol")||0.4;
music.volume=volume.value;

let playing=localStorage.getItem("playing")==="true";

toggle.onclick=()=>panel.classList.toggle("show");

playBtn.onclick=()=>{
  if(music.paused){
    music.play();
    playBtn.src="pause.png";
    playing=true;
  }else{
    music.pause();
    playBtn.src="play.png";
    playing=false;
  }
  localStorage.setItem("playing",playing);
};

volume.oninput=()=>{
  music.volume=volume.value;
  localStorage.setItem("vol",volume.value);
};

/* автозапуск после клика */
document.addEventListener("click", ()=>{
  if(playing && music.paused){
    music.play().catch(()=>{});
  }
}, { once:true });

/* load */
function link(n,p=null){
  n.parent=p;
  if(n.children) n.children.forEach(c=>link(c,n));
}

fetch("structure.json")
.then(r=>r.json())
.then(data=>{
  root=data;
  link(root);
  render(root);
});
</script>

</body>
</html>
