<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>fomjn</title>

<link rel="icon" type="image/png" href="logo.png">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  color: #ddd;

  cursor: url("cursor.png") 0 0, auto;
}

/* фикс курсора для ВСЕГО */
input, div, * {
  cursor: url("cursor.png") 0 0, auto !important;
}

/* ===== ФОН ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: url("bg_v3.png") repeat;
  background-size: 128px 128px;

  animation: moveBg 6s linear infinite;
  filter: brightness(0.25);

  z-index: -1;
}

@keyframes moveBg {
  from { background-position: 0 0; }
  to { background-position: 0 128px; }
}

/* ===== FULLSCREEN ===== */
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  padding: 10px;
  background: linear-gradient(#5f6368, #3a3d42);
  font-weight: bold;
}

.header div {
  flex: 1;
}

/* ===== LIST ===== */
.file-list {
  flex: 1;
  overflow-y: auto;
}

/* ===== ROW ===== */
.file {
  display: flex;
  align-items: center;
  padding: 6px 10px;
}

.file:hover {
  background: rgba(255,255,255,0.08);
}

.file.active {
  background: #e6e6e6;
  color: #000;
}

/* ===== ICON ===== */
.icon {
  width: 16px;
  margin-right: 8px;
}

/* ===== COLS ===== */
.name {
  flex: 3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.length { flex: 1; }
.date { flex: 2; }

/* ===== SEARCH ===== */
.search {
  padding: 6px;
  background: #2a2d31;
}

.search input {
  width: 100%;
  padding: 6px;
  background: #1e1f22;
  border: none;
  color: #ccc;
  outline: none;
}

/* ===== TOAST ===== */
.copy-toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px 15px;
  border-radius: 8px;
  opacity: 0;
  transition: 0.3s;
}

.copy-toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="name">Name</div>
    <div class="length">Size</div>
    <div class="date">Date</div>
  </div>

  <div id="files" class="file-list"></div>

  <div class="search">
    <input type="text" id="search" placeholder="Search">
  </div>

</div>

<div id="toast" class="copy-toast">Copied</div>

<script>
let structure = null;
let current = null;
let currentItems = [];

/* ===== КОНВЕРТАЦИЯ JSON ===== */
function convert(obj, name) {
  let node = {
    name: name,
    type: "folder",
    children: []
  };

  for (let key in obj) {
    if (key === "_files") {
      obj[key].forEach(f => {
        node.children.push({
          name: f.name,
          type: "file",
          size: f.size || "",
          date: f.date || ""
        });
      });
    } else {
      node.children.push(convert(obj[key], key));
    }
  }

  return node;
}

/* ===== LOAD ===== */
async function load() {
  const res = await fetch("structure.json");
  const raw = await res.json();

  // ВАЖНО: создаём корень без лишнего уровня
  structure = {
    name: "root",
    type: "folder",
    children: []
  };

  for (let key in raw) {
    structure.children.push(convert(raw[key], key));
  }

  addParents(structure);
  current = structure;

  render(current.children);
}

/* ===== RENDER ===== */
function render(items) {
  const container = document.getElementById("files");
  container.innerHTML = "";
  currentItems = items;

  // назад
  if (current.parent) {
    const back = createRow({
      name: "../",
      type: "folder",
      isBack: true
    });

    back.onclick = () => {
      current = current.parent;
      render(current.children);
    };

    container.appendChild(back);
  }

  items.forEach(item => {
    const div = createRow(item);

    div.onclick = () => {
      document.querySelectorAll(".file").forEach(f => f.classList.remove("active"));
      div.classList.add("active");

      if (item.type === "folder") {
        current = item;
        render(item.children);
      } else {
        navigator.clipboard.writeText(item.name);
        showToast();
      }
    };

    container.appendChild(div);
  });
}

/* ===== ROW ===== */
function createRow(item) {
  const div = document.createElement("div");
  div.className = "file";

  div.innerHTML = `
    <img class="icon" src="${item.type === 'folder' ? 'folder.png' : 'file.png'}">
    <div class="name">${item.name}</div>
    <div class="length">${item.size || ""}</div>
    <div class="date">${item.date || ""}</div>
  `;

  return div;
}

/* ===== SEARCH ===== */
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  const filtered = currentItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  render(filtered);
});

/* ===== PARENTS ===== */
function addParents(node, parent=null) {
  node.parent = parent;
  if (node.children) {
    node.children.forEach(child => addParents(child, node));
  }
}

/* ===== TOAST ===== */
function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 800);
}

load();
</script>

</body>
</html>
